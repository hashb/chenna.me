name: Build and Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Fetch guestbook data
        run: python3 scripts/fetch-guestbook-data.py

      - name: Write build info
        run: |
          mkdir -p _data
          echo "{\"commit\": \"${GITHUB_SHA:0:7}\", \"time\": \"$(date -u '+%Y-%m-%d %H:%M UTC')\"}" > _data/build.json

      - name: Build Jekyll
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production

      - name: Minify
        run: |
          go install github.com/tdewolff/minify/v2/cmd/minify@latest
          $(go env GOPATH)/bin/minify -r -o _site/ _site/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
